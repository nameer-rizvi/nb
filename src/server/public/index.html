<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Node.js Boilerplate</title>
    <link href="tw.css" rel="stylesheet" />
  </head>
  <body>
    <main class="flex min-h-screen flex-col p-10 lg:p-20 font-mono">
      <div
        class="flex border-b-2 border-black dark:border-white pb-2 justify-between"
      >
        <h1 class="text-3xl font-bold">Node.js Boilerplate</h1>
        <img src="favicon.ico" class="h-8 w-8 ml-4" />
      </div>
      <ul class="py-10">
        <li class="py-5">
          <a class="underline hover:text-blue-500" href="/api" rel="nofollow"
            >API.json</a
          >
        </li>
        <li class="py-5">
          <a class="underline hover:text-blue-500" href="/robots.txt"
            >Robots.txt</a
          >
        </li>
        <li class="py-5">
          <a class="underline hover:text-blue-500" href="/sitemap.xml"
            >Sitemap.xml</a
          >
        </li>
        <li class="py-5">
          <a
            class="underline hover:text-blue-500"
            href="mailto:example@example.com"
            >Contact us.</a
          >
        </li>
      </ul>
      <a
        id="status"
        class="my-5 py-1 px-3 w-fit text-sm rounded-lg bg-gray-400 dark:bg-gray-600"
        href="http://api.example.com/status"
        target="_blank"
      ></a>
    </main>
    <script src="script.js" referrerpolicy="no-referrer"></script>
  </body>
</html>
